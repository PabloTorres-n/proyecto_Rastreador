<ion-header class="ion-no-border">
  <ion-toolbar mode="ios">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="home" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Configuración</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-modern">
  <div class="main-container">

    <div class="section-header">Rastreo y Seguridad</div>
    
    <div class="settings-card">
      <div class="setting-row">
        <div class="icon-inner blue">
          <ion-icon name="timer-outline"></ion-icon>
        </div>
        <div class="info">
          <h3>Intervalo de Reporte</h3>
          <p>Frecuencia de actualización GPS</p>
        </div>
        <ion-select slot="end" interface="popover" value="30" toggleIcon="chevron-down-outline">
          <ion-select-option value="10">10s</ion-select-option>
          <ion-select-option value="30">30s</ion-select-option>
          <ion-select-option value="300">5m</ion-select-option>
        </ion-select>
      </div>

      <div class="divider"></div>

      <div class="setting-row">
        <div class="icon-inner orange">
          <ion-icon name="locate-outline"></ion-icon>
        </div>
        <div class="info">
          <h3>Geocerca Automática</h3>
          <p>Aviso si sale del perímetro</p>
        </div>
        <ion-toggle slot="end" color="warning" [checked]="true"></ion-toggle>
      </div>
    </div>

    <div class="section-header">Personalización</div>

    <div class="settings-card">
      <div class="setting-row">
        <div class="icon-inner dark">
          <ion-icon [name]="isDarkMode ? 'moon' : 'sunny-outline'"></ion-icon>
        </div>
        <div class="info">
          <h3>Modo Oscuro</h3>
          <p>Tema visual de la aplicación</p>
        </div>
        <ion-toggle slot="end" [checked]="isDarkMode" (ionChange)="toggleDarkMode($event)"></ion-toggle>
      </div>
    </div>

    <div class="app-version">
      Atja’Yaa’La App v1.0.0
    </div>

  </div>
</ion-content>
