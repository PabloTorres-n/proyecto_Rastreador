<ion-header class="ion-no-border">
  <ion-toolbar mode="ios">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="home" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Configuración General</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-modern">
  <div class="main-container">

   

    <div class="section-header">Preferencias de la App</div>
    <div class="settings-card">
      <div class="setting-row">
        <div class="icon-inner dark">
          <ion-icon [name]="isDarkMode ? 'moon' : 'sunny-outline'"></ion-icon>
        </div>
        <div class="info">
          <h3>Modo Oscuro</h3>
          <p>Tema visual de Atja’Yaa’La</p>
        </div>
        <ion-toggle slot="end" [checked]="isDarkMode" (ionChange)="toggleDarkMode($event)"></ion-toggle>
      </div>

      <div class="divider"></div>

      <div class="setting-row">
        <div class="icon-inner orange">
          <ion-icon name="notifications-outline"></ion-icon>
        </div>
        <div class="info">
          <h3>Notificaciones Push</h3>
          <p>Alertas de geocerca y batería</p>
        </div>
        <ion-toggle slot="end" [checked]="true"></ion-toggle>
      </div>
    </div>

    <div class="section-header">Soporte</div>
    <div class="settings-card">
      <div class="setting-row" (click)="abrirAyuda()">
        <div class="icon-inner green">
          <ion-icon name="help-buoy-outline"></ion-icon>
        </div>
        <div class="info">
          <h3>Centro de Ayuda</h3>
        </div>
      </div>
    </div>

   

     <div class="profile-branding">
      <img src="assets/splash.png" alt="Logo" />
      <p>Tracker System</p>
      <span>Zapopan, Jalisco</span>
    </div>
  </div>
</ion-content>
