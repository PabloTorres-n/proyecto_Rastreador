<ion-content [fullscreen]="true">
  <div class="auth-container">
    
    <header class="header-section">
      <div class="logo-wrapper">
        <img src="assets/logoO.png" alt="Logo" class="logo-img" />
      </div>
      <h1 class="main-title">ATJA’YAA’LA</h1>
      <p class="main-subtitle">Tu mascota, siempre segura.</p>
    </header>

    <main class="form-section">
      <div class="input-group">
        <ion-item lines="none" class="classic-input">
          <ion-icon name="mail-outline" slot="start"></ion-icon>
          <ion-input type="email" placeholder="Correo electrónico" [(ngModel)]="email"></ion-input>
        </ion-item>

        <ion-item lines="none" class="classic-input">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input type="password" placeholder="Contraseña" [(ngModel)]="password"></ion-input>
        </ion-item>
      </div>

      <ion-button expand="block" mode="ios" class="btn-classic-blue" (click)="entrar()">
        INICIAR SESIÓN
      </ion-button>
    </main>

    <footer class="footer-section">
      <p>¿No tienes cuenta? <span class="register-text" (click)="irARegistro()">Regístrate</span></p>
    </footer>

  </div>
</ion-content>
