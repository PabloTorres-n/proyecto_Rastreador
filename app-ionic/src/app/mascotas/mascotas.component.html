<ion-header class="ion-no-border">
  <ion-toolbar mode="ios">
    <ion-title>Mis Mascotas</ion-title>
    <ion-buttons slot="end">
      <ion-button >
        <ion-icon slot="icon-only" name="add-outline" class="add-icon"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="list-wrapper">
    <div *ngFor="let pet of mascotas" class="pet-item">
      
      <div class="info-row">
        <div class="avatar-minimal">{{ pet.nombre[0] }}</div>
        <div class="text-group">
          <span class="name">{{ pet.nombre }}</span>
          <span class="species">{{ pet.especie }}</span>
        </div>
        
        <div class="battery-mini" [class.low]="pet.bateria < 20">
          <ion-icon [name]="pet.bateria < 20 ? 'battery-dead' : 'battery-charging'"></ion-icon>
          {{ pet.bateria }}%
        </div>
      </div>

      <div class="action-row">
  <button class="btn-profile-ghost">
    <ion-icon name="person-outline"></ion-icon>
    Ver Perfil
  </button>

  <button class="btn-map-circle" (click)="verEnMapa(pet)">
    <ion-icon name="paper-plane"></ion-icon>
  </button>
</div>

    </div>
  </div>
</ion-content>
