<ion-header class="ion-no-border" style="position: absolute; z-index: 1000;">
  <ion-toolbar style="--background: transparent;">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/perfil" text="" color="dark" style="background: white; border-radius: 50%; width: 45px; height: 45px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-no-padding">
  
  <div id="mapIdFull" style="width: 100%; height: 100%;"></div>

  <div style="position: absolute; bottom: 100px; left: 15px; right: 15px; background: white; border-radius: 25px; padding: 18px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); z-index: 1000;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div style="background: #1e3c72; padding: 10px; border-radius: 12px;">
          <ion-icon name="paw-outline" style="color: white; font-size: 1.4rem;"></ion-icon>
        </div>
        <div>
          <h2 style="margin: 0; font-weight: bold; color: #333; font-size: 1.2rem;">{{ mascotaStatus.nombre }}</h2>
          <ion-badge color="success" mode="ios" style="font-size: 0.7rem;">{{ mascotaStatus.estado }}</ion-badge>
        </div>
      </div>
      <div style="text-align: right;">
        <p style="margin: 0; font-size: 0.75rem; color: #999;">{{ mascotaStatus.ultimaConexion }}</p>
      </div>
    </div>

    <ion-grid style="padding: 0; border-top: 1px solid #f0f0f0; padding-top: 12px;">
      <ion-row>
        <ion-col size="6" style="display: flex; align-items: center; gap: 8px;">
          <ion-icon name="battery-charging-outline" color="success" style="font-size: 1.3rem;"></ion-icon>
          <ion-label>
            <small style="display: block; color: #999; font-size: 0.65rem; text-transform: uppercase;">Energía</small>
            <strong style="color: #333;">{{ mascotaStatus.bateria }}%</strong>
          </ion-label>
        </ion-col>
        <ion-col size="6" style="display: flex; align-items: center; gap: 8px;">
          <ion-icon name="wifi-outline" color="primary" style="font-size: 1.3rem;"></ion-icon>
          <ion-label>
            <small style="display: block; color: #999; font-size: 0.65rem; text-transform: uppercase;">Señal GPS</small>
            <strong style="color: #333;">{{ mascotaStatus.senal }}</strong>
          </ion-label>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="reCentrar()" color="primary">
      <ion-icon name="locate-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
