<ion-content class="light-bg">
  <div class="main-container">
    
    <div class="profile-header">
      <div class="avatar-wrapper">
        <img src="https://ui-avatars.com/api/?name=Juan+Perez&background=eef2ff&color=231b6b" alt="Avatar" />
        <div class="edit-btn">
          <ion-icon name="camera"></ion-icon>
        </div>
      </div>
      <h2>Juan Pérez</h2>
      <span class="badge-role">CLIENTE VERIFICADO</span>
    </div>

    <div class="info-section">
      <p class="label-group">Datos de contacto</p>
      
      <div class="info-card">
        <div class="info-item">
          <div class="icon-box blue-icon">
            <ion-icon name="mail-outline"></ion-icon>
          </div>
          <div class="text-box">
            <small>Email</small>
            <p>juan.perez@example.com</p>
          </div>
        </div>

        <div class="info-item">
          <div class="icon-box blue-icon">
            <ion-icon name="call-outline"></ion-icon>
          </div>
          <div class="text-box">
            <small>Teléfono</small>
            <p>+52 33 1234 5678</p>
          </div>
        </div>

        <div class="info-item no-border">
          <div class="icon-box blue-icon">
            <ion-icon name="location-outline"></ion-icon>
          </div>
          <div class="text-box">
            <small>Ubicación</small>
            <p>Guadalajara, Jalisco</p>
          </div>
        </div>
      </div>

      <!-- <p class="label-group">Plan y Servicios</p>
      <div class="info-card special-card">
        <div class="info-item no-border">
          <div class="icon-box orange-gradient">
            <ion-icon name="ribbon-outline" style="color: white;"></ion-icon>
          </div>
          <div class="text-box">
            <small>Plan Activo</small>
            <p style="color: #f38430; font-weight: 700;">Plan Rastreo Pro</p>
          </div>
          <ion-button slot="end" fill="clear" color="warning" class="renew-btn">
            Renovar
          </ion-button>
        </div>
      </div> -->

      <p class="label-group">Más Opciones</p>
      <div class="info-card">
        <div class="info-item">
          <div class="icon-box orange-icon">
            <ion-icon name="card-outline"></ion-icon>
          </div>
          <div class="text-box">
            <p>Métodos de Pago</p>
          </div>
          <ion-icon name="chevron-forward-outline" slot="end" class="arrow-icon"></ion-icon>
        </div>

        <div class="info-item no-border">
          <div class="icon-box orange-icon">
            <ion-icon name="help-circle-outline"></ion-icon>
          </div>
          <div class="text-box">
            <p>Soporte Técnico</p>
          </div>
          <ion-icon name="chevron-forward-outline" slot="end" class="arrow-icon"></ion-icon>
        </div>
      </div>

    </div>

    <div class="footer-actions">
      <ion-button expand="block" fill="clear" class="logout-button" (click)="logout()">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        Desconectar cuenta
      </ion-button>
    </div>

  </div>
</ion-content>
