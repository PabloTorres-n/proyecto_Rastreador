<ion-content [fullscreen]="true">
  <div class="auth-wrapper">
    
    <div class="header-nav">
      <ion-button fill="clear" (click)="irALogin()" color="primary">
        <ion-icon name="chevron-back-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>

    <div class="logo-container">
      <div class="logo-circle">
        <img src="assets/logoO.png" class="img-logo" alt="Logo" />
      </div>
      <h1 class="app-title">ATJA’YAA’LA</h1>
      <p class="app-subtitle">Crea tu cuenta ahora</p>
    </div>

    <div class="login-card">
      <h2 style="color: #231b6b; font-weight: 800; font-size: 1.2rem; margin-bottom: 20px;">
        Información Personal
      </h2>

      <ion-item lines="none" class="custom-input">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input 
          label="Nombre del dueño" 
          labelPlacement="floating" 
          [(ngModel)]="nuevoUsuario.nombre" 
          placeholder="Nombre completo">
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-input">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input 
          label="Email" 
          type="email" 
          labelPlacement="floating" 
          [(ngModel)]="nuevoUsuario.correo" 
          placeholder="correo@ejemplo.com">
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-input">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input 
          label="Contraseña" 
          type="password" 
          labelPlacement="floating" 
          [(ngModel)]="nuevoUsuario.contrasena" 
          placeholder="Crea una clave segura">
        </ion-input>
      </ion-item>

      <ion-button expand="block" class="btn-primary" (click)="realizarRegistro()">
        FINALIZAR
      </ion-button>

      <div class="footer-action">
        <p (click)="irALogin()">¿Ya tienes cuenta? <span>Inicia Sesión</span></p>
      </div>
    </div>

    <p class="terms-text">
      Al registrarte, aceptas nuestros términos y condiciones de uso de Atja’Yaa’La.
    </p>

  </div>
</ion-content>
